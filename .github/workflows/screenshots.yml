name: Screenshots

on:
  push:
    branches: [main]
    paths:
      - "docs/tapes/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pydocfix
        run: pip install -e .

      - name: Install VHS and dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update && sudo apt-get install -y vhs ffmpeg ttyd

      - name: Generate diagnostic screenshot
        run: vhs docs/tapes/diagnostic.tape

      - name: Generate diff screenshot
        run: vhs docs/tapes/diff.tape

      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update screenshots"
          file_pattern: "docs/images/*.gif"
