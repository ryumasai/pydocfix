name: Screenshots

on:
  push:
    branches: [main]
    paths:
      - "docs/tapes/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pydocfix
        run: pip install -e .

      - name: Install VHS and dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update && sudo apt-get install -y vhs ffmpeg ttyd

      - name: Generate screenshots
        run: |
          for tape in docs/tapes/*.tape; do
            vhs "$tape"
          done

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: update screenshots"
          branch: docs/update-screenshots
          title: "docs: update screenshots"
          body: "Automated screenshot update from VHS."
          labels: documentation
          assignees: ryumasai
