name: Screenshots

on:
  push:
    branches: [main]
    paths:
      - "docs/tapes/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/charmbracelet/vhs

    steps:
      - uses: actions/checkout@v4

      - name: Install pydocfix
        run: |
          apk add --no-cache python3 py3-pip
          pip install -e . --break-system-packages

      - name: Generate diagnostic screenshot
        run: vhs docs/tapes/diagnostic.tape

      - name: Generate diff screenshot
        run: vhs docs/tapes/diff.tape

      - name: Commit screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update screenshots"
          file_pattern: "docs/images/*.gif"
